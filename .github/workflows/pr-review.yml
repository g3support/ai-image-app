name: AI PR Review + Crash Detection

on:
  pull_request:
    branches: [ main ]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Build project
        run: npm run build

  docker-test:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-image-app:test .

      - name: Boot container
        run: |
          docker run -d -p 8080:8080 ai-image-app:test
          sleep 10
          curl http://localhost:8080 || exit 1

  ai-review:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Run Codex review
        uses: openai/codex-action@v1
        with:
          prompt-file: .github/codex-review-prompt.md
